{% extends "base.html" %}

{% block content %}

<section class="auth-section">
    <h1>Login</h1>

    <form method="POST" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Login</button>
    </form>

    <p>
        Don't have an account?
        <a href="{% url 'register' %}">Register here</a>
    </p>
</section>

{% endblock %}
