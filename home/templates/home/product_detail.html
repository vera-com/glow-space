{% extends "base.html" %}

{% block content %}
<section class="product-detail-section">
    <div class="product-detail-card">
        {% if product.image %}
            <img src="{{ product.image.url }}" alt="{{ product.name }}">
        {% endif %}

        <div>
            <h1>{{ product.name }}</h1>
            <p>{{ product.description }}</p>
            <p><strong>€{{ product.price }}</strong></p>

            <button class="buy-btn">Buy Now</button>
        </div>
    </div>
</section>
{% endblock %}
