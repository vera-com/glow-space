{% extends "base.html" %}
{% load static %}

{% block content %}

<section class="booking-page">

    <div class="booking-image">
        <img src="{% static 'images/salon-booking.jpg' %}" alt="Luxury beauty salon">
    </div>

    <div class="booking-form-container">

    <h1>Book an Appointment</h1>

    <p>
        Choose your preferred beauty and wellness service.
    </p>

    <form method="POST" 
    class="booking-form">
      {% csrf_token %}
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label for="service">Service</label>
    <select id="service" name="service" required>
        <option>Facial Treatment</option>
        <option>Massage Therapy</option>
        <option>Nail Care</option>
    </select>

    <label for="date">Preferred Date</label>
<input type="date" id="date" name="preferred_date" required>

<label for="time">Preferred Time</label>
<input type="time" id="time" name="preferred_time" required>


    <button type="submit">Book Now</button>
</form>
</div>

</section>

{% endblock %}
