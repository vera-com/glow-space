{% extends "base.html" %}

{% block content %}

<section class="booking-page">
    <div class="booking-form-container">
        <h1>Edit Appointment</h1>

        <form method="POST" class="booking-form">
            {% csrf_token %}

            <label for="name">Name</label>
            <input type="text" id="name" name="name" value="{{ booking.name }}" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ booking.email }}" required>

            <label for="service">Service</label>
            <select id="service" name="service" required>
                <option value="Facial Treatment" {% if booking.service == "Facial Treatment" %}selected{% endif %}>Facial Treatment</option>
                <option value="Massage Therapy" {% if booking.service == "Massage Therapy" %}selected{% endif %}>Massage Therapy</option>
                <option value="Nail Care" {% if booking.service == "Nail Care" %}selected{% endif %}>Nail Care</option>
            </select>

            <label for="date">Preferred Date</label>
            <input type="date" id="date" name="preferred_date" value="{{ booking.preferred_date|date:'Y-m-d' }}" required>

            <label for="time">Preferred Time</label>
            <input type="time" id="time" name="preferred_time" value="{{ booking.preferred_time|time:'H:i' }}" required>

            <button type="submit">Update Appointment</button>
        </form>
    </div>
</section>

{% endblock %}
